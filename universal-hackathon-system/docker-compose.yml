version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: uhs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-uhs}
      POSTGRES_USER: ${POSTGRES_USER:-uhs}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uhs}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - uhs

  redis:
    image: redis:7-alpine
    container_name: uhs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - uhs

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uhs_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-uhs}:${POSTGRES_PASSWORD:-uhs}@postgres:5432/${POSTGRES_DB:-uhs}
      - REDIS_URL=redis://redis:6379/0
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173}
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    networks:
      - uhs

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uhs_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
      - VITE_WS_URL=${VITE_WS_URL:-ws://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - uhs

volumes:
  pgdata: {}

networks:
  uhs:
    driver: bridge